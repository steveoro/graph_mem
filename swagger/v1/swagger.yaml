---
openapi: 3.0.1
info:
  title: GraphMem API
  description: REST API for the GraphMem knowledge graph memory system. Provides entity, observation, relation management, search, context scoping, bulk operations, and maintenance utilities.
  version: v1 (1.5.0)
servers:
- url: http://localhost:3030
  description: Local development server

tags:
- name: Memory Entities
  description: CRUD operations for knowledge graph entities
- name: Memory Observations
  description: Manage observations (facts) attached to entities
- name: Memory Relations
  description: Directed relations between entities
- name: Context
  description: Entity-scoped context management
- name: Search
  description: Subgraph search and retrieval
- name: Bulk Operations
  description: Atomic batch creation of entities, observations, and relations
- name: Maintenance
  description: Graph health, statistics, and merge suggestions
- name: Status
  description: Health check, version, and server time
- name: Graph Data
  description: Cytoscape-format visualization data

security:
- McpClientHeader: []

paths:
  # ── Memory Entities ────────────────────────────────────────────────
  "/api/v1/memory_entities":
    get:
      operationId: listMemoryEntities
      summary: List memory entities (paginated)
      tags: [Memory Entities]
      parameters:
      - name: page
        in: query
        required: false
        description: Page number (default 1)
        schema:
          type: integer
          default: 1
      - name: per_page
        in: query
        required: false
        description: Entities per page (default 20, max 100)
        schema:
          type: integer
          default: 20
          maximum: 100
      responses:
        '200':
          description: Paginated list of entities
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      "$ref": "#/components/schemas/memory_entity"
                  pagination:
                    "$ref": "#/components/schemas/pagination"
    post:
      operationId: createMemoryEntity
      summary: Create memory entity
      tags: [Memory Entities]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_entity:
                  type: object
                  properties:
                    name:
                      type: string
                      example: My Project
                    entity_type:
                      type: string
                      example: Project
                    aliases:
                      type: string
                      example: "MyProj|mp"
                      description: Pipe-separated alternative names
                    description:
                      type: string
                      example: A short description
                  required: [name, entity_type]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_entity"
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

  "/api/v1/memory_entities/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      operationId: showMemoryEntity
      summary: Show memory entity with observations and relations
      tags: [Memory Entities]
      responses:
        '200':
          description: Entity with full details
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_entity_full"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    patch:
      operationId: patchMemoryEntity
      summary: Update memory entity (partial)
      tags: [Memory Entities]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_entity:
                  type: object
                  properties:
                    name:
                      type: string
                    entity_type:
                      type: string
                    aliases:
                      type: string
                    description:
                      type: string
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_entity"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    put:
      operationId: putMemoryEntity
      summary: Update memory entity (full replace)
      tags: [Memory Entities]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_entity:
                  type: object
                  properties:
                    name:
                      type: string
                    entity_type:
                      type: string
                    aliases:
                      type: string
                    description:
                      type: string
                  required: [name, entity_type]
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_entity"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
        '422':
          description: Validation failed or missing required fields
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    delete:
      operationId: deleteMemoryEntity
      summary: Delete memory entity (cascades to observations and relations)
      tags: [Memory Entities]
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

  "/api/v1/memory_entities/search":
    get:
      operationId: searchMemoryEntities
      summary: Search entities (hybrid text + vector)
      tags: [Memory Entities]
      parameters:
      - name: q
        in: query
        required: true
        description: Search query (case-insensitive, tokenized)
        schema:
          type: string
      responses:
        '200':
          description: Relevance-ranked results
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/search_result"

  "/api/v1/memory_entities/{id}/merge_into/{target_id}":
    parameters:
    - name: id
      in: path
      required: true
      description: Source entity ID (will be deleted)
      schema:
        type: integer
    - name: target_id
      in: path
      required: true
      description: Target entity ID (will receive merged data)
      schema:
        type: integer
    post:
      operationId: mergeMemoryEntity
      summary: Merge source entity into target
      tags: [Memory Entities]
      responses:
        '204':
          description: Merged successfully
        '404':
          description: Entity not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

  # ── Memory Observations ────────────────────────────────────────────
  "/api/v1/memory_entities/{memory_entity_id}/memory_observations":
    parameters:
    - name: memory_entity_id
      in: path
      required: true
      schema:
        type: integer
    get:
      operationId: listMemoryObservations
      summary: List observations for an entity
      tags: [Memory Observations]
      responses:
        '200':
          description: List of observations
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/memory_observation"
        '404':
          description: Parent entity not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    post:
      operationId: createMemoryObservation
      summary: Create observation for an entity
      tags: [Memory Observations]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_observation:
                  type: object
                  properties:
                    content:
                      type: string
                      example: An important observation
                  required: [content]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_observation"
        '404':
          description: Parent entity not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

  "/api/v1/memory_entities/{memory_entity_id}/memory_observations/{id}":
    parameters:
    - name: memory_entity_id
      in: path
      required: true
      schema:
        type: integer
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      operationId: showMemoryObservation
      summary: Show observation
      tags: [Memory Observations]
      responses:
        '200':
          description: Observation details
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_observation"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    patch:
      operationId: patchMemoryObservation
      summary: Update observation (partial)
      tags: [Memory Observations]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_observation:
                  type: object
                  properties:
                    content:
                      type: string
                  required: [content]
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_observation"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    put:
      operationId: putMemoryObservation
      summary: Update observation (full replace)
      tags: [Memory Observations]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_observation:
                  type: object
                  properties:
                    content:
                      type: string
                  required: [content]
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_observation"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    delete:
      operationId: deleteMemoryObservation
      summary: Delete observation
      tags: [Memory Observations]
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

  "/api/v1/memory_entities/{memory_entity_id}/memory_observations/delete_duplicates":
    parameters:
    - name: memory_entity_id
      in: path
      required: true
      schema:
        type: integer
    delete:
      operationId: deleteDuplicateObservations
      summary: Delete duplicate observations for an entity
      tags: [Memory Observations]
      responses:
        '200':
          description: Duplicates removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                  deleted_count:
                    type: integer
        '404':
          description: Parent entity not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

  # ── Memory Relations ───────────────────────────────────────────────
  "/api/v1/memory_relations":
    get:
      operationId: listMemoryRelations
      summary: List/filter relations
      tags: [Memory Relations]
      parameters:
      - name: from_entity_id
        in: query
        required: false
        schema:
          type: integer
      - name: to_entity_id
        in: query
        required: false
        schema:
          type: integer
      - name: relation_type
        in: query
        required: false
        schema:
          type: string
      responses:
        '200':
          description: Filtered list of relations
          content:
            application/json:
              schema:
                type: array
                items:
                  "$ref": "#/components/schemas/memory_relation"
    post:
      operationId: createMemoryRelation
      summary: Create relation
      tags: [Memory Relations]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_relation:
                  type: object
                  properties:
                    from_entity_id:
                      type: integer
                    to_entity_id:
                      type: integer
                    relation_type:
                      type: string
                      example: part_of
                  required: [from_entity_id, to_entity_id, relation_type]
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_relation"
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

  "/api/v1/memory_relations/{id}":
    parameters:
    - name: id
      in: path
      required: true
      schema:
        type: integer
    get:
      operationId: showMemoryRelation
      summary: Show relation
      tags: [Memory Relations]
      responses:
        '200':
          description: Relation details
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_relation"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    patch:
      operationId: patchMemoryRelation
      summary: Update relation type (partial)
      tags: [Memory Relations]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_relation:
                  type: object
                  properties:
                    relation_type:
                      type: string
                  required: [relation_type]
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_relation"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    put:
      operationId: putMemoryRelation
      summary: Update relation type (full replace)
      tags: [Memory Relations]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                memory_relation:
                  type: object
                  properties:
                    relation_type:
                      type: string
                  required: [relation_type]
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/memory_relation"
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
        '422':
          description: Validation failed
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    delete:
      operationId: deleteMemoryRelation
      summary: Delete relation
      tags: [Memory Relations]
      responses:
        '204':
          description: Deleted
        '404':
          description: Not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

  # ── Context ────────────────────────────────────────────────────────
  "/api/v1/context":
    get:
      operationId: getContext
      summary: Get current context
      tags: [Context]
      responses:
        '200':
          description: Current context status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [context_active, no_context, context_cleared]
                  entity_id:
                    type: integer
                  entity_name:
                    type: string
                  entity_type:
                    type: string
                  description:
                    type: string
    post:
      operationId: setContext
      summary: Set context
      tags: [Context]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entity_id:
                  type: integer
                  description: ID of the entity to scope to
              required: [entity_id]
      responses:
        '200':
          description: Context set
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: context_set
                  entity_id:
                    type: integer
                  entity_name:
                    type: string
                  entity_type:
                    type: string
        '404':
          description: Entity not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
        '422':
          description: Missing entity_id
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"
    delete:
      operationId: clearContext
      summary: Clear context
      tags: [Context]
      responses:
        '200':
          description: Context cleared
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: context_cleared
                  was_active:
                    type: boolean

  # ── Search ─────────────────────────────────────────────────────────
  "/api/v1/search/subgraph":
    get:
      operationId: searchSubgraph
      summary: Search subgraph (entities + relations, paginated)
      tags: [Search]
      parameters:
      - name: q
        in: query
        required: true
        description: Search term
        schema:
          type: string
      - name: search_in_name
        in: query
        required: false
        schema:
          type: boolean
          default: true
      - name: search_in_type
        in: query
        required: false
        schema:
          type: boolean
          default: true
      - name: search_in_aliases
        in: query
        required: false
        schema:
          type: boolean
          default: true
      - name: search_in_observations
        in: query
        required: false
        schema:
          type: boolean
          default: true
      - name: page
        in: query
        required: false
        schema:
          type: integer
          default: 1
      - name: per_page
        in: query
        required: false
        schema:
          type: integer
          default: 20
          maximum: 100
      responses:
        '200':
          description: Subgraph of matching entities and inter-relations
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/subgraph"
        '422':
          description: Missing or invalid parameters
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

  "/api/v1/search/subgraph_by_ids":
    post:
      operationId: getSubgraphByIds
      summary: Get subgraph by entity IDs
      tags: [Search]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entity_ids:
                  type: array
                  items:
                    type: integer
                  minItems: 1
              required: [entity_ids]
      responses:
        '200':
          description: Subgraph of specified entities
          content:
            application/json:
              schema:
                type: object
                properties:
                  entities:
                    type: array
                    items:
                      "$ref": "#/components/schemas/entity_with_observations"
                  relations:
                    type: array
                    items:
                      "$ref": "#/components/schemas/memory_relation"
        '422':
          description: Invalid or empty entity_ids
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

  # ── Bulk Operations ────────────────────────────────────────────────
  "/api/v1/bulk":
    post:
      operationId: bulkCreate
      summary: Bulk create entities, observations, and relations (atomic)
      tags: [Bulk Operations]
      description: Maximum 50 total operations per call. Rolls back entirely on any error.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                entities:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                      entity_type:
                        type: string
                      aliases:
                        type: string
                      description:
                        type: string
                      observations:
                        type: array
                        items:
                          type: string
                    required: [name, entity_type]
                observations:
                  type: array
                  items:
                    type: object
                    properties:
                      entity_id:
                        type: integer
                      text_content:
                        type: string
                    required: [entity_id, text_content]
                relations:
                  type: array
                  items:
                    type: object
                    properties:
                      from_entity_id:
                        type: integer
                      to_entity_id:
                        type: integer
                      relation_type:
                        type: string
                    required: [from_entity_id, to_entity_id, relation_type]
      responses:
        '201':
          description: All operations succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  created_entities:
                    type: array
                    items:
                      type: object
                  created_observations:
                    type: array
                    items:
                      type: object
                  created_relations:
                    type: array
                    items:
                      type: object
                  summary:
                    type: object
                    properties:
                      entities_created:
                        type: integer
                      observations_created:
                        type: integer
                      relations_created:
                        type: integer
        '422':
          description: Rolled back due to errors
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

  # ── Maintenance ────────────────────────────────────────────────────
  "/api/v1/maintenance/suggest_merges":
    get:
      operationId: suggestMerges
      summary: Find potential duplicate entities via vector similarity
      tags: [Maintenance]
      parameters:
      - name: threshold
        in: query
        required: false
        description: "Max cosine distance (0.0=identical, 1.0=unrelated). Default: 0.3"
        schema:
          type: number
          default: 0.3
      - name: limit
        in: query
        required: false
        description: "Max suggestions. Default: 20"
        schema:
          type: integer
          default: 20
      - name: entity_type
        in: query
        required: false
        description: Filter to a specific entity type
        schema:
          type: string
      responses:
        '200':
          description: Merge suggestions
          content:
            application/json:
              schema:
                type: object
                properties:
                  suggestions:
                    type: array
                    items:
                      type: object
                      properties:
                        entity_a:
                          type: object
                        entity_b:
                          type: object
                        cosine_distance:
                          type: number
                        recommendation:
                          type: string
                          enum: [high_confidence_merge, review_manually]
                  total:
                    type: integer
                  threshold_used:
                    type: number

  "/api/v1/maintenance/stats":
    get:
      operationId: getGraphStats
      summary: Graph health metrics and statistics
      tags: [Maintenance]
      responses:
        '200':
          description: Graph statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  totals:
                    type: object
                    properties:
                      entities:
                        type: integer
                      observations:
                        type: integer
                      relations:
                        type: integer
                      audit_logs:
                        type: integer
                  entity_type_distribution:
                    type: object
                  orphan_count:
                    type: integer
                  stale_count:
                    type: integer
                  most_connected:
                    type: array
                    items:
                      type: object
                  recently_updated:
                    type: array
                    items:
                      type: object

  # ── Status & Utilities ─────────────────────────────────────────────
  "/api/v1/status":
    get:
      operationId: getStatus
      summary: Health check and version
      tags: [Status]
      responses:
        '200':
          description: Server status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  version:
                    type: string
                    example: 1.5.0
                required: [status, version]

  "/api/v1/time":
    get:
      operationId: getServerTime
      summary: Current server time (ISO 8601)
      tags: [Status]
      responses:
        '200':
          description: Current time
          content:
            application/json:
              schema:
                type: object
                properties:
                  current_time:
                    type: string
                    format: date-time

  # ── Graph Data (UI) ────────────────────────────────────────────────
  "/api/v1/graph_data":
    get:
      operationId: getGraphData
      summary: Graph visualization data (Cytoscape format)
      tags: [Graph Data]
      parameters:
      - name: entity_id
        in: query
        required: false
        description: Show subgraph centered on this entity
        schema:
          type: integer
      - name: scoped_entity_id
        in: query
        required: false
        description: Show scoped subgraph (entity + part_of children)
        schema:
          type: integer
      - name: root_only
        in: query
        required: false
        description: Show only root-level (Project) entities
        schema:
          type: boolean
      responses:
        '200':
          description: Graph elements (nodes + edges)
          content:
            application/json:
              schema:
                type: object
                properties:
                  elements:
                    type: array
                    items:
                      type: object
                  options:
                    type: object
        '404':
          description: Referenced entity not found
          content:
            application/json:
              schema:
                "$ref": "#/components/schemas/error_response"

components:
  securitySchemes:
    McpClientHeader:
      type: apiKey
      in: header
      name: X-MCP-Client
      description: Optional MCP client identifier for request attribution

  schemas:
    error_response:
      type: object
      properties:
        error:
          type: string
          description: Human-readable error message
        details:
          description: Additional error details (e.g., field-level validation errors)
      required: [error]

    memory_entity:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        entity_type:
          type: string
        aliases:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        memory_observations_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required: [id, name, entity_type]

    memory_entity_full:
      allOf:
      - "$ref": "#/components/schemas/memory_entity"
      - type: object
        properties:
          observations:
            type: array
            items:
              "$ref": "#/components/schemas/memory_observation"
          relations_from:
            type: array
            items:
              type: object
              properties:
                relation_id:
                  type: integer
                to_entity_id:
                  type: integer
                to_entity_name:
                  type: string
                relation_type:
                  type: string
          relations_to:
            type: array
            items:
              type: object
              properties:
                relation_id:
                  type: integer
                from_entity_id:
                  type: integer
                from_entity_name:
                  type: string
                relation_type:
                  type: string

    memory_observation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        content:
          type: string
        memory_entity_id:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required: [id, content, memory_entity_id]

    memory_relation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        from_entity_id:
          type: integer
        to_entity_id:
          type: integer
        relation_type:
          type: string
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required: [id, from_entity_id, to_entity_id, relation_type]

    search_result:
      type: object
      properties:
        entity_id:
          type: integer
        name:
          type: string
        entity_type:
          type: string
        description:
          type: string
          nullable: true
        aliases:
          type: string
          nullable: true
        memory_observations_count:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        relevance_score:
          type: number
        matched_fields:
          type: array
          items:
            type: string

    entity_with_observations:
      type: object
      properties:
        entity_id:
          type: integer
        name:
          type: string
        entity_type:
          type: string
        aliases:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        observations:
          type: array
          items:
            type: object
            properties:
              observation_id:
                type: integer
              content:
                type: string
              created_at:
                type: string
                format: date-time
              updated_at:
                type: string
                format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    subgraph:
      type: object
      properties:
        entities:
          type: array
          items:
            "$ref": "#/components/schemas/entity_with_observations"
        relations:
          type: array
          items:
            "$ref": "#/components/schemas/memory_relation"
        pagination:
          "$ref": "#/components/schemas/pagination"

    pagination:
      type: object
      properties:
        total_entities:
          type: integer
        per_page:
          type: integer
        current_page:
          type: integer
        total_pages:
          type: integer
