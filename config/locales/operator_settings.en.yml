    settings:
      title: "System Settings"
      subtitle: "Configure feature flags, database backup, embedding service, and summarization behavior."
      save_group: "Save changes"
      reset: "Reset"
      footer_info: "Changes apply immediately: no need to restart the application. Scheduled backup times are defined in config/recurring.yml."
      groups:
        feature_flags: "Feature Flags"
        database_backup: "Database Backup"
        embeddings: "Embeddings"
        summaries: "Summaries"
      bulk_update:
        success: "Saved %{count} setting(s) successfully."
        partial: "Saved %{success} setting(s); %{failed} failed."
      validation:
        greater_than: "Must be greater than %{value}."
        less_than_or_equal_to: "Must be at most %{value}."
      fields:
        enable_dream_state_compactor:
          label: "Dream state / compactor"
          description: "When disabled, scheduled and manual dream-state compaction jobs are skipped."
        enable_garbage_collector:
          label: "Garbage collector"
          description: "When disabled, scheduled and manual garbage collection runs are skipped."
        backup_folder_path:
          label: "Backup folder path"
          description: "Relative to Rails root or an absolute path. Docker deployments should mount this folder as a volume."
        backup_keep_max:
          label: "Maximum backups to keep"
          description: "Oldest managed backups for the current environment are deleted after each successful dump. Legacy manually named files are kept."
        backup_schedule_cron:
          label: "Scheduled backup times"
          description: "Read from config/recurring.yml for the current environment."
        enable_scheduled_backups:
          label: "Enable scheduled backups"
          description: "When enabled, Solid Queue runs DatabaseBackupJob on the schedule shown above."
        embedding_url:
          label: "Embedding server URL"
          description: "Ollama or OpenAI-compatible embedding endpoint. Leave blank to use OLLAMA_URL from the environment."
        embedding_model:
          label: "Embedding model"
          description: "Model name passed to the embedding API. Leave blank to use EMBEDDING_MODEL from the environment."
        embedding_provider:
          label: "Embedding provider"
          description: "ollama or openai_compatible. Leave blank to use EMBEDDING_PROVIDER from the environment."
        embedding_dims:
          label: "Embedding dimensions"
          description: "Expected vector size (e.g. 768). Set to 0 to use EMBEDDING_DIMS from the environment or the default."
        enable_scheduled_embedding_backfill:
          label: "Enable scheduled backfill"
          description: "When enabled, Solid Queue runs a daily backfill job for missing embeddings."
        embedding_backfill_schedule_cron:
          label: "Scheduled backfill times"
          description: "Read from config/recurring.yml for the current environment."
        enable_llm_summarization:
          label: "Enable LLM summarization"
          description: "When disabled, summarize returns deterministic extractive evidence only. The summarize endpoint remains available."
        summary_url:
          label: "Summary server URL"
          description: "Ollama or OpenAI-compatible text-generation endpoint. Leave blank to use SUMMARY_URL or OLLAMA_URL from the environment."
        summary_model:
          label: "Summary model"
          description: "Interchangeable model name passed to the generation API (e.g. qwen3:8b). Leave blank to use SUMMARY_MODEL from the environment."
        summary_provider:
          label: "Summary provider"
          description: "ollama or openai_compatible. Leave blank to use SUMMARY_PROVIDER from the environment."
        summary_timeout:
          label: "Summary timeout (seconds)"
          description: "HTTP timeout for generation requests. Set to 0 to use SUMMARY_TIMEOUT from the environment or the default."
        summary_max_tokens:
          label: "Summary max tokens"
          description: "Maximum output tokens for generated summaries. Set to 0 to use SUMMARY_MAX_TOKENS from the environment or the default."
        summary_observations_per_entity:
          label: "Observations per entity"
          description: "Maximum observations to include per entity before capping. 0 disables the cap. Set to 0 to use SUMMARY_OBSERVATIONS_PER_ENTITY from the environment or the default."
      backup:
        actions_title: "Manual backup"
        list_title: "Available backups"
        empty: "No backup files found in the backup folder."
        run_now: "Run backup now"
        run_confirm: "Create a new database backup now?"
        run_success: "Database backup completed successfully."
        run_failed: "Database backup failed: %{error}"
        restore: "Restore"
        restore_confirm: "Restore database from %{filename}? This will DROP and recreate the current database."
        restore_success: "Database restored from %{filename}."
        restore_failed: "Restore failed: %{error}"
        delete: "Delete"
        delete_confirm: "Delete backup file %{filename}? This cannot be undone."
        delete_success: "Deleted backup %{filename}."
        delete_failed: "Delete failed: %{error}"
        columns:
          filename: "Filename"
          size: "Size"
          modified: "Modified"
          actions: "Actions"
      embeddings:
        blank_uses_env: "Leave blank to use ENV"
        used_when_blank: "Used when blank:"
        provider_blank: "— use ENV / default —"
        priority_hint: "Configuration priority: AppSettings (this tab) → environment variables → built-in defaults. Workers pick up changes after save."
        manage_link: "Open embeddings dashboard"
        test_title: "Connection test"
        invalid_provider: "Invalid embedding provider. Use ollama or openai_compatible."
        invalid_dims: "Dimensions must be 0 (use ENV/default) or between 1 and 4096."
        invalid_url: "Embedding URL must be a valid http or https URL."
      summaries:
        blank_uses_env: "Leave blank to use ENV"
        used_when_blank: "Used when blank:"
        provider_blank: "— use ENV / default —"
        priority_hint: "Configuration priority: AppSettings (this tab) → environment variables → built-in defaults. Changes apply on the next summarize request."
        deterministic_hint: "When LLM summarization is disabled or unavailable, summarize returns deterministic extractive evidence with source IDs."
        invalid_provider: "Invalid summary provider. Use ollama or openai_compatible."
        invalid_timeout: "Timeout must be 0 (use ENV/default) or between 1 and 300 seconds."
        invalid_max_tokens: "Max tokens must be 0 (use ENV/default) or between 16 and 4096."
        invalid_observations_per_entity: "Observations per entity must be 0 (use ENV/default) or between 0 and 100."
        invalid_url: "Summary URL must be a valid http or https URL."
